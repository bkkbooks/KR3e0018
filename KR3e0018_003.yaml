  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0018_WYG_003-1a, image: WYG0738/WYG0738-0067c.png}
body:
  text: 明堂灸經卷三足太陰脾經一十二穴隱白二穴在足大指端內側去爪甲如韭葉灸三壯主腹滿喜嘔吐主腹中寒冷氣脹喘不得安卧主飲渴主脛中寒熱足寒不能溫主卒尸厥不知人脈動如故胸中痛食不下暴泄衄血大都二穴在足大指內本節後陷中灸三壯主目眩暴泄心痛腹脹熱病汗出足清厥逆霍亂目上插手足逆冷腹滿喜嘔煩熱悶亂吐逆太白二穴在足大指內側核骨下陷中灸三壯主頭痛寒熱汗出不惡寒胸脅脹衄痛身熱煩滿腹脹食不化氣脹腸鳴嘔吐泄有膿血腰痛不可俯仰熱病頭重項痛煩悶身熱熱爭大便難氣逆霍亂腹痛公孫二穴在足大指本節後一寸灸三壯主頭面腫腫脹食不化鼓脹腹內氣大滿寒瘧不嗜食心煩狂言商丘二穴在足內踝下微前陷中灸三壯主心下有寒脾痛脾熱脾虛令火病不樂好太息心悲氣逆腹脹滿不得息一嘔心煩滿骨痺癲疾癎病寒瘧痛中痛痎瘧主痔血泄後重痔骨蝕絶子喜魘夢股內痛痛氣癰狐疝走上下引小腹痛不可俯仰小腹堅痛下引陰中三陰交二穴在內踝上三寸灸三壯主膝內亷痛小便不利身重足痿不能行痃癖腹寒氣逆脾病四肢不舉腹脹腸鳴溏泄食不化女子漏下不止漏谷二穴在內踝上六寸骨下陷中灸三壯主腸鳴強缺心悲氣逆腹填滿急小便不利失精久濕痺不能行足熱痛腿冷不能久立麻痺不仁痃癖冷氣心腹脹滿食飲不為肌膚乾機二穴在膝下五寸又名神舍伸足取之灸三壯主溏瘕腹中痛氣脹水腫腹堅不嗜食小便不利藏痺腰痛不可俯仰足痺痛屈伸難癲疝精不足女子血瘕按之如湯沃股膝皆痛隂陵泉二穴在膝下內側輔骨下陷者中伸足取之灸三壯主心下滿寒中小便不利腹中脹不嗜食脅下滿腹中盛水脹喘逆不得卧足痺痛霍亂失禁遺尿胸中熱暴泄脹滿不得息氣淋寒熱不節腎病不可俯仰氣隆尿黃婦人疝瘕按之如以湯沃股膝飱泄隂痛小腹堅急重下濕不嗜食腰痛血海二穴在膝臏上內亷白肉際二寸中又作二寸灸五壯主漏下若血閉不通逆氣脹月水不調箕門二穴在魚腹上筋門動應手隂市內主隂跳遺小便難主淋鼠鼷腫痛厲兊二穴在足大指次指之端去爪甲如韭葉灸一壯主鼻不利涕黃齲齒喉痺哽咽寒熱脛寒不得卧好驚寒瘧不嗜食惡寒心痛脹滿不得息熱病汗不出吐舌戾頸喜驚尸厥口噤氣絶狀如中惡面腫惡風鼻不利內庭二穴在足大指次指外間陷者中灸三壯主四肢厥逆僻噤齒齲痛腹脹滿不得息不嗜食喜頻伸數缺惡聞人音振寒咽中痛口喎陷谷二穴在足大指次指外間本節後去內庭二寸灸三壯主胸脅肢滿腹大滿喜噫腸鳴而痛面目癰腫浮腫水病熱病汗不出振寒瘧疾衝陽二穴在足跗上五寸骨間去陷谷一寸一云二寸灸三壯主面浮腫足痿失履不收主熱病汗不出振寒而戰缺先寒洗淅甚久而熱熱去汗去之瘧瘧從足起腹大不嗜食偏風口眼喎登高而歌棄衣而走齒齲痛解溪二穴在衡陽後一寸半灸三壯主口齒痛膝股腫胻酸轉筋霍亂頭風面目赤癲疾瘈瘲驚濕痺腹大下腫厥氣上榰風水面浮腫顔黑刺瘧口痛齧舌目眩頭痛癲疾煩悲豐陰二穴在外踝上八寸灸三壯主頭痛寒熱汗出不惡寒大小便澀難主胸痛如刺腹若刀切痛四肢腫身濕不能食狂妄行登高而歌弃衣而走厥逆手卒青痛如刺煩心狂見鬼好笑卒面四肢腫喉痺不能言面浮腫下亷二穴在上亷下三寸又名巨虛灸三壯主小腹痛飱泄次指間痛唇乾涎出不覺狂言非常寒濕下注小便難黃不得汗出毛髮焦脫肉少氣胃中熱不嗜食泄膿血胸脅少腹痛暴驚狂女子乳癰喉痺䯒痛足跗不收條口二穴在下亷上一寸主脛寒不得卧足下熱不能久立膝䯒酸寒痛足緩履不收濕痺巨虛上亷二穴在三里下三寸舉足取之灸三壯主藏氣不足偏風腲腿手足不仁小便難黃風水膝腫飱泄腹脅支滿走俠臍腹痛食不化喘息不能行三里二穴在膝下三寸䯒骨外灸三壯主喉痺不能言脅中暴逆腹脹滿不得息咳嗽多唾主肘痛時寒腰痛不可以顧足痿失履不收足下熱不能久立主瘧少氣腸鳴腹痛胸腹中瘀血水腫腹脹隂氣不足小腹堅熱病汗不出喜嘔口苦壯熱身反折口噤鼓領腰痛不可以顧視而有所見喜悲上下求之口僻乳腫目不明胃氣不足聞食臭久泄利食不化脅下脹滿膝痿寒熱中消穀善饑腹熱身煩狂言乳癰狂歌妄笑恐怒大罵霍亂遺尿失氣陽厥悽悽惡寒頭痛小便不利食氣水氣蠱毒痃廦四肢腫滿五勞缺七傷虛乏凡此等疾皆灸之多至五百壯少至二三百壯犢鼻二穴在膝臏干骭上俠解大筋中主膝中痛不仁難跪起膝臏癕潰者不可治不潰者可療梁丘二穴在膝上二寸兩筋間或云三寸灸三壯主筋攣膝不得屈伸不可以行主大驚乳痛寒痺隂市二穴在膝上三寸伏兔下陷者宛宛中若拜而取之不可灸又名隂鼎主腹中滿痿厥少氣腰痛不可以顧主膝上伏兔中寒寒疝小腹痛力痿氣少腰如氷水伏兔二穴在膝上六寸不灸髀關二穴在膝上伏兔後交分中主黃疸膽寒不仁痿痺不得屈伸厥股內筋絡急明堂灸經卷三
