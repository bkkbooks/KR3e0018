  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0018_WYG_003-1a, image: WYG0738/WYG0738-0067c.png}
body:
  text: 明堂灸經卷三足太陰脾經一十二穴隠白二穴在足大指端内側去爪甲如韭葉灸三壯主腹滿喜嘔吐主腹中寒冷氣脹喘不得安卧主飲渇主脛中寒熱足寒不能温主卒尸厥不知人脈動如故胷中痛食不下暴洩衂血大都二穴在足大指内本節後陷中灸三壯主目眩暴泄心痛腹脹熱病汗出足清厥逆霍亂目上插手足逆冷腹滿喜嘔煩熱悶亂吐逆太白二穴在足大指内側核骨下陷中灸三壯主頭痛寒熱汗出不惡寒胷脇脹衂痛身熱煩滿腹脹食不化氣脹腸鳴嘔吐泄有膿血腰痛不可俯仰熱病頭重項痛煩悶身熱熱争大便難氣逆霍亂腹痛公孫二穴在足大指本節後一寸灸三壯主頭面腫腫脹食不化鼓脹腹内氣大滿寒瘧不嗜食心煩狂言商丘二穴在足内踝下微前陷中灸三壯主心下有寒脾痛脾熱脾虚令火病不樂好太息心悲氣逆腹脹滿不得息一嘔心煩滿骨痺癲疾癎病寒瘧痛中痛痎瘧主痔血泄後重痔骨蝕絶子喜魘夢股内痛痛氣癰狐疝走上下引小腹痛不可俛仰小腹堅痛下引陰中三陰交二穴在内踝上三寸灸三壯主膝内亷痛小便不利身重足痿不能行痃癖腹寒氣逆脾病四肢不舉腹脹腸鳴溏泄食不化女子漏下不止漏谷二穴在内踝上六寸骨下陷中灸三壯主腸鳴強欠心悲氣逆腹填滿急小便不利失精久濕痺不能行足熱痛腿冷不能久立麻痺不仁痃癖冷氣心腹脹滿食飲不為肌膚乾機二穴在膝下五寸又名神舍伸足取之灸三壯主溏瘕腹中痛氣脹水腫腹堅不嗜食小便不利藏痺腰痛不可俛仰足痺痛屈伸難癲疝精不足女子血瘕按之如湯沃股膝皆痛隂陵泉二穴在膝下内側輔骨下陷者中伸足取之灸三壯主心下滿寒中小便不利腹中脹不嗜食脇下滿腹中盛水脹喘逆不得卧足痺痛霍亂失禁遺尿胷中熱暴泄脹滿不得息氣淋寒熱不節腎病不可俛仰氣隆尿黄婦人疝瘕按之如以湯沃股膝飱洩隂痛小腹堅急重下濕不嗜食腰痛血海二穴在膝臏上内亷白肉際二寸中又作二寸灸五壯主漏下若血閉不通逆氣脹月水不調箕門二穴在魚腹上筋門動應手隂市内主隂跳遺小便難主淋鼠鼷腫痛厲兊二穴在足大指次指之端去爪甲如韭葉灸一壯主鼻不利涕黃齲齒喉痺哽咽寒熱脛寒不得卧好驚寒瘧不嗜食惡寒心痛脹滿不得息熱病汗不出吐舌戾頸喜驚尸厥口噤氣絶狀如中惡面腫惡風鼻不利内庭二穴在足大指次指外間陷者中灸三壯主四肢厥逆僻噤齒齲痛腹脹滿不得息不嗜食喜頻伸數欠惡聞人音振寒咽中痛口喎陷谷二穴在足大指次指外間本節後去内庭二寸灸三壯主胷脇肢滿腹大滿喜噫腸鳴而痛面目癰腫浮腫水病熱病汗不出振寒瘧疾衝陽二穴在足跗上五寸骨間去陷谷一寸一云二寸灸三壯主面浮腫足痿失履不收主熱病汗不出振寒而戰欠先寒洗淅甚久而熱熱去汗去之瘧瘧從足起腹大不嗜食偏風口眼喎登高而歌棄衣而走齒齲痛解谿二穴在衡陽後一寸半灸三壯主口齒痛膝股腫胻酸轉筋霍亂頭風面目赤癲疾瘈瘲驚濕痺腹大下腫厥氣上榰風水面浮腫顔黑刺瘧口痛齧舌目眩頭痛癲疾煩悲豐陰二穴在外踝上八寸灸三壯主頭痛寒熱汗出不惡寒大小便澀難主胷痛如刺腹若刀切痛四肢腫身濕不能食狂妄行登高而歌弃衣而走厥逆手卒青痛如刺煩心狂見鬼好笑卒面四肢腫喉痺不能言面浮腫下亷二穴在上亷下三寸又名巨虚灸三壯主小腹痛飱洩次指間痛唇乾涎出不覺狂言非常寒濕下注小便難黄不得汗出毛髪焦脱肉少氣胃中熱不嗜食洩膿血胷脇少腹痛暴驚狂女子乳癰喉痺䯒痛足跗不收條口二穴在下亷上一寸主脛寒不得卧足下熱不能久立膝䯒酸寒痛足緩履不收濕痺巨虚上亷二穴在三里下三寸舉足取之灸三壯主藏氣不足偏風腲腿手足不仁小便難黄風水膝腫飱洩腹脇支滿走俠臍腹痛食不化喘息不能行三里二穴在膝下三寸䯒骨外灸三壯主喉痺不能言脇中暴逆腹脹滿不得息咳嗽多唾主肘痛時寒腰痛不可以顧足痿失履不收足下熱不能久立主瘧少氣腸鳴腹痛胷腹中瘀血水腫腹脹隂氣不足小腹堅熱病汗不出喜嘔口苦壯熱身反折口噤鼓領腰痛不可以顧視而有所見喜悲上下求之口僻乳腫目不明胃氣不足聞食臭久泄利食不化脇下脹滿膝痿寒熱中消穀善饑腹熱身煩狂言乳癰狂歌妄笑恐怒大罵霍亂遺尿失氣陽厥悽悽惡寒頭痛小便不利食氣水氣蠱毒痃廦四肢腫滿五勞缺七傷虚乏凡此等疾皆灸之多至五百壯少至二三百壯犢鼻二穴在膝臏干骭上俠解大筋中主膝中痛不仁難跪起膝臏癕潰者不可治不潰者可療梁丘二穴在膝上二寸兩筋間或云三寸灸三壯主筋攣膝不得屈伸不可以行主大驚乳痛寒痺隂市二穴在膝上三寸伏兔下陷者宛宛中若拜而取之不可灸又名隂鼎主腹中滿痿厥少氣腰痛不可以顧主膝上伏兔中寒寒疝小腹痛力痿氣少腰如氷水伏兔二穴在膝上六寸不灸髀闗二穴在膝上伏兔後交分中主黄疸膽寒不仁痿痺不得屈伸厥股内筋絡急明堂灸經卷三
