  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0018_WYG_006-1a, image: WYG0738/WYG0738-0080c.png}
body:
  text: 明堂灸經卷六手太陽小腸經九穴少澤二穴在手小指端外側去爪甲一分陷中灸一壯主口熱口乾口中乾咽中乾口中熱唾如膠瘧寒汗不出主振寒小指不用頭痛喉痺舌強瘈瘲咳嗽頭項急不可顧目生翳覆瞳子陽谷二穴在小指外側本節後陷中灸三壯主目泣出目急痛耳鳴咽偏腫不可咽臂重痛肘攣攣熱病汗不出目翳臂不舉痎瘧熱目上插小便赤咳嗽衄血頸項痛鼻塞後溪二穴在小指外側本節後陷中灸一壯主目淚出眥爛有翳耳聾耳鳴鼻衄窒喘息不通肩臑痛臂肘攣急風身寒泣出而驚熱痛不出汗身熱惡寒胸滿頸項強不得回顧癲病腕骨二穴在手外側腕前起骨下陷中灸三壯主頸項痛不可顧目泣出生翳頷痛引耳嘈嘈耳鳴無所聞脅痛不可息肘節痺臂酸重腋急臂腕急外側痛腕如脫煩滿驚熱病汗不出五指掣不可屈伸乍寒乍熱瘧狂言臂肩疼頭痛煩悶驚風瘈瘲陽谷二穴在手外側腕中兊骨之下陷中灸三壯主項強急痛不可以顧目痛赤頷疼引耳嘈嘈耳無所聞主自齧唇上牙齒痛下牙齒痛脅痛不得息肘痛時寒熱病振栗鼓頷腹滿痿色不變乍寒乍熱熱痛主笑若狂吐舌戻頸妄言痔痛腋下腫熱病汗不出臂腕外側痛不舉妄言左右顧瘈瘲目眩養老二穴在手髁骨上一穴在後一寸陷者中灸三壯主手不得上下肩痛欲折目視不明支正二穴在腕後五寸灸三壯主頸腫項痛不可顧頭痛目眩風虛驚恐狂言熱病先腰脛酸喜渴數飲食身熱項痛而強振寒寒熱小海二穴在肘內大骨外去肘端五分灸五壯主項強急痛不可以顧齲齒齗腫四肢不舉癎發瘈瘲狂走不得卧心中煩癲疾羊癎吐舌羊鳴戾頸瘧背振寒及風癲頭痛寒熱汗出不惡寒肘腋腫少腹痛風眩瘍腫肩貞二穴在肩曲脾下兩骨解間肩􅀈後陷者中外臺灸三壯主頷痛引耳嘈嘈耳鳴無所聞肩中熱頭不可以顧風痺手臂臂不舉足太陽膀胱經十七穴至陰二穴在足小指外側去爪甲角如韭葉灸三壯主鼻鼽清涕出西方子主耳聾鳴胸脅痛無常處腰脅相引急痛小便不利失精風寒從足小指起脈痺上下目生翳頭風鼻塞轉筋寒瘧汗不出足下熱通谷二穴在足小指外側本節前陷中灸三壯主頭重頭痛寒熱汗出不惡寒項如拔不可左右顧目眩目昏昏不明惡風寒胸脅支滿心中憤憤數欠癲心下悸咽中淡淡恐主結積留飲癖囊胸滿飲心痛鼻鼽清涕出善驚引鼽衄項痛胸滿食不化束骨二穴在足小指外側本節後陷中灸三壯主腸泄癲疾互引善驚羊鳴主癲大便頭痛狂易多言不休瘧從腳胻起髀摳中痛不可舉腰痛如折腨如結寒熱目眩目風赤內眥赤爛耳聾惡風寒項不可回顧京骨二穴在足外側大骨下赤白肉際陷中灸三壯主目中白翳目反白從內眥始目眩主頭熱鼻衄鼻不利涕黃鼻中衄血不主淋濼自齧唇背惡寒痛脊頸項強難以俯仰腳攣足寒脊痓反折狂仆瘧寒熱善驚悸不欲食癲病狂走痰髀摳痛申脈二穴在外踝下陷中容爪甲白肉際主目反主視若赤痛從內眥始腰痛不能舉脛中寒熱不能久立坐若下舟車中癲疾腠氣鼻衄血不止金門二穴在足外踝下陷中又名關梁灸三壯主癲疾馬癎尸厥暴死轉筋霍亂腳胻痠身戰不能久立小發癎張口搖頭身反折僕參二穴在足跟骨下陷中又名安耶拱足取之灸七壯主足跟下踝後痛足痿失履不收癲疾馬癎吐舌鼓頷狂言見鬼恍惚尸厥煩痛轉筋霍亂小兒馬癎張口搖頭身反折馬鳴崑崙二穴在足外踝後跟骨上陷中細脈動應手灸十壯主目眩不明目如脫目昏昏不明惡風寒目急痛赤腫頭熱鼻鼽衄腹痛滿暴喘腹脹滿不得息不得大便洞泄體痛霍亂尻腰腫腨跟腫腳如結踝如裂不得履地狂易大風癎瘈口閉不得開瘧多汗瘧寒小兒陰腫頭眩痛腳痿轉筋尸厥中惡吐逆咳喘暴痛承山二穴在腨腸下分肉間陷中者又名魚腹楊山肉柱灸三壯主頭熱鼻鼽衄大便難腳攣腳脛痠腳急跟痛腳筋急痛兢兢足下熱不能久立寒熱癲疾腳腨酸痛膝腰腨重起坐難小腹疝氣遊行五藏腹中切痛轉筋霍亂久痔腫痛飛揚二穴在外踝上七寸又名厥陽灸三壯主頸項疼厯節風足指不得屈伸汗出腰痛如折腨中痛寒瘧癲疾吐舌下部寒熱汗不出體重狂瘧頭目眩痛痓脊反折痔篡傷痛野雞痔逆氣頭熱鼻鼽衄足痿失履不收承筋二穴在脛上從腳跟上七寸腨中央陷中又名腨腸直腸頭痛寒熱汗不出惡寒支腫大便難筋攣腳脛酸腳急跟痛腳筋急痛兢兢足下熱不能久立脛痺不仁轉筋霍亂瘈瘲腳酸腰痛如折腳腨痠痛重引小腹及腰脊痛惡寒痔痛指下腫鼻鼽合陽二穴在膝約中央下三寸銅人云二寸灸五壯主腰脊強痛引腹膝股熱胻痠重㿗疝女子崩中腹上下痛腸澼陰局暴敗痛委中二穴在膕中央約文中動脈凡風痺腰腳重痛于此刺血久痼宿疹亦皆立已主小腹熱而偏痛陰跳遺小便難尿赤難衄血劇不止腰痛夾脊至頭皆痛筋急身熱痔痛腋下腫痛腳弱無力腰尻重不能舉曲䐐中筋急半身不遂小腹堅腫脊強反折瘈瘲癲疾頭痛熱病汗不出足熱不逆滿膝不得屈伸委陽二穴乃三焦下輔輸也足太陽之前少陽之後出於膕中外亷兩筋間扶承下六寸灸三壯主陰跳乏小便難小腹堅痛引陰中不得小便淋漓腰痛不可俯仰脊強反折瘈瘲癲疾頭痛筋急腋下腫痛胸滿澎脹身熱飛尸遁注痿厥不仁浮却二穴在委陽下一寸展足得之灸三壯主小腹熱大便堅大陽膀胱經熱大腸結股外經筋急殷門二穴在肉郤下六寸主腰脊不可俯仰厥痿惡血流注之股外腫扶承二穴在尻臀下股陰下文中又云尻臀下橫文中又云肉郤陰關皮部主小便不利失精腰脊尻臀股陰寒痛痔腋下腫尻下腫大便直出陰胞有寒腰脊相引如解尻腋腫大便難明堂灸經卷六
