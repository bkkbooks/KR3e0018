body:
  text: 明堂灸經卷五手少陽三焦經十七穴關衝二穴在手小指之端去爪甲角如韭葉灸三壯主風眩頭痛喉痺舌卷口乾心煩臂外亷痛手不及頭左取左右取右主肘痛不能自帶衣主肩臂酸重面黑渴風熱病煩心心悶而汗不出掌中熱心痛心熱如火浸淫煩滿舌本痛寒熱悽索氣上不得卧霍亂肩中熱頭不可以顧胸中氣噎目生白翳液門二穴在小指次指間陷者中灸三壯主呼吸短氣咽如息肉狀目眥目眩暴變耳聾手臂痛不能上下喜驚妄言面赤熱病先不樂頭痛面熱無寒風寒熱耳痛鳴聾牙齒痛咽外腫寒厥痎瘧中渚二穴在小指次指本節後間陷中灸三壯主頭重頷顱熱痛面赤目昏昏不明惡風寒嗌痛寒熱耳痛聾嘈嘈主咽腫肘臂痛手指不得屈伸伸熱病汗不出目生翳膜久瘧陽池在表腕上陷者灸三壯又名别陽主熱病汗不出寒熱瘧或因折腹手腕捉物不得肩臂痛不得舉手外關二穴在腕後二寸陷中主肘腕酸重屈伸難手十指盡痛不得握兼主耳淳淳渾渾聾無所聞臂痿不仁臂不及頭支溝二穴在腕後三寸兩骨間灸三壯主心痛如錐刺甚者手足寒至節不息者死主咳面赤而熱肘節痺臂酸腫腋熱病汗不出馬刀腫痿主漏主痂疥女人脊急目赤嗌痛暴瘖霍亂四肢不舉嘔吐口噤不開暴不不能言及腋脅痛會宗二穴在腕後三寸空中灸三壯主耳渾渾淳淳聾無所聞肌膚痛風癎三陽絡二穴在臂上大交脈支溝上一寸灸七壯主嗜卧四肢不欲動搖耳猝聾齒齲暴啞不能言四瀆二穴在肘前五寸外亷陷中主呼吸短氣咽中如息肉狀耳暴聾不牙痛天井二穴在肘後外大骨後一寸兩筋間陷者中屈肘得之灸三壯甄權云曲肘後一寸又手按膝頭取之主大風默默不知所痛悲傷不樂悲愁恍惚瘧疾時發心痛驚瘈主癲疾羊癎吐舌羊鳴戾頸肩痛痿痺不仁肩下不可屈伸肩肉麻木咳嗽上氣唾膿不嗜食風痺清泠泉二穴在肘上三寸伸肘舉臂取之又名清泠淵青靈灸三壯主臑從肩不舉不能帶衣頭痛振寒目黃脅痛消濼二穴在肩下臂外關腋斜附分下行灸三壯主寒熱痺頭痛項如拔不可左右顧頸有大氣天宗二穴在秉風後大骨下陷中主肩重臂痛肘後廉痛頰頷痛臑腧二穴夾肩髎後大骨下胛上亷陷下灸三壯主寒熱肩腫引胛中痛臂酸無力肩外腧二穴在胛上亷去肩三寸陷者中灸三壯主肩甲痛而寒至肘寒熱引項急強左右不顧肩中腧二穴在肩胛內亷去脊二寸陷者中灸三壯主小兒妳􅊓目不明寒熱目視不明咳嗽上氣唾血曲垣二穴在肩中央曲胛陷者中按之應手痛灸十壯主肩中周痺主氣注肩胛髀拘急疼悶明堂灸經卷五
