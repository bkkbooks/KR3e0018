body:
  text: 明堂灸經醫家類提要臣等謹案明堂灸經八卷題曰西方子撰不知何許人與銅人針灸經俱刋于山西平陽府其書専論灸法銅人惟有正背左右人形此則兼及側伏較更詳密考唐志有黃帝十二經明堂偃側人圖十二卷兹或其遺法歟其曰明堂者錢曾讀書敏求記曰昔黃帝問岐伯以人之經絡盡書其言藏于靈臺之室洎雷公請問乃坐明堂授之後世言明堂者以此今醫家記針灸之穴為偶人點志其處名明堂非也今考舊唐書經籍志以明堂經脈别為一類則曽之説信矣古法多針灸並言或惟言針或言針以該灸靈樞稱針經是也自王燾外臺祕要始力言誤針之害凡針法針穴俱刪不録惟立灸法為一門此書言灸不言針蓋猶燾志也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c37ca0151918f04115a290b129ba851f82d84c526bc2d7612f5a2969013f93c6
