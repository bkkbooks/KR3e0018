  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0018_WYG_008-1a, image: WYG0738/WYG0738-0090a.png}
body:
  text: 明堂灸經卷八足少陽膽經十五穴竅隂二穴在足小指次指之端去爪甲如韭葉炙三壯主脅痛咳逆不得息足煩熱汗不出四肢轉筋癰疽頭痛心煩喉痺舌强口乾肘不可舉猝聾不聞人語俠溪二穴在足小指二岐骨間本節前陷中灸三壯主胸脅支滿寒熱汗不出目外眥赤目眩頰頷腫耳聾胸中痛不可轉側痛無常處目系急目下腫皆痛逆寒泣出目癢頷痛引耳嘈嘈無所聞瘧足痛腋下腫馬刀瘻婦人小腹堅痛月水不通乳腫潰胸中寒如風狀頭眩兩頰痛地五㑹二穴在足小指次指本節後陷中去俠溪一寸不灸臨泣二穴在足小指次指本節後間陷中去俠溪一寸五分灸三壯主胸中滿缺盆中腋下腫馬刀傷痿善齧頰缺滿中腫淫濼䯒痠目眩枕骨領厭懸之痛灑淅振寒婦人月事不利季脅支滿乳癰心痛周痺痛無常處氣喘不能行痎瘧瘧日西發大風目痛痺中痛不得行足外使痛身痺灑淅振寒小兒驚癎反視丘墟二穴在足外踝下如前陷中去臨泣三寸灸三壯主胸脅滿痛不得息久瘧振寒腋下痛痿厥坐不能起髀樞中痛目生翳膜腿胻痠轉筋猝疝少腹堅寒熱頭腫瘧振寒腕不收目不明付陽二穴在外踝上三寸太陽前少陽後筋骨間主痿厥風痺頭重痛腨外廉骨痛四肢不舉瘈瘲風痺不仁時有寒熱懸鍾二穴在足外踝上三寸動脉中灸五壯又名絶骨主心腹脹滿胃中熱不嗜食膝䯒痛筋攣足不收履坐不能起五淋濕痺流腫筋急瘈瘲脛痛小兒腹滿不能食飲四肢不舉風勞身重陽輔二穴在足外踝上四寸輔骨前絶骨端如前二分去丘墟七寸灸三壯主腰溶溶如坐水中膝下膚腫筋瘛諸節盡痛痛無常處腋下腫瘻馬刀喉痺膝䯒痠風痺不仁腰痛不可以顧腰痛如錘居中腫痛不可咳咳則筋縮急諸節痛寒熱脅痛光明二穴在足外踝上五寸灸五壯主身懈寒淫濼䯒痠不能久立與陽輔治病同法熱病汗不出猝狂虛則痠痺坐不能起實則足䯒熱膝痛身體不仁善齧頰腹足清寒熱膝痛經熱不能行手足偏小外丘二穴在足外踝上六寸可灸三壯主膚痛痿痺胸脅脹滿頸項痛惡風寒癲疾陽交二穴在足外踝上七寸斜屬足三陽肉分之間又名别陽主寒厥驚狂喉痺胸滿面腫寒痺膝䯒不收寒熱陽陵泉二穴在膝下一寸外廉陷中銅人云在外踝上七寸又以蹲坐取之日可灸七壯至七七壯主膝伸不能屈冷痺腳下不仁偏風半身不遂腳冷無血色頭痛寒熱口苦嗌中介介頭面腫胸脅柱滿心中怵惕恐如人捕陽關二穴在陽陵泉上三寸犢鼻外陷中不可灸中瀆二穴在髀骨外膝上五寸分肉間陷中不可灸環跳二穴在髀樞中側臥伸左足屈上足取之灸五十壯主風濕痺風疹偏風半身不遂腰胯痛不得轉側治胸脅痛無常處腰脅相引急痛髀樞中痛不可舉脛痛不可伸屈脛痺不仁大訓二穴在足大指端去爪甲如韭葉及三毛中炙三壯主猝疝小便數遺溺隂頭中痛心痛汗出隂跳上入腹隂偏大腹臍中痛悒悒不樂病左取右右取左腹脹滿少腹痛中熱喜寐尸厥狀如死婦人血崩不止目不欲視太息五淋不得尿噦噫行間二穴在足大指間動脉應手陷中灸三壯主溺難白濁寒疝少腹腫咳逆嘔血腰痛不可俯仰腹中脹心痛色蒼蒼如死狀終日不得息口喎四肢逆冷嗌乾煩渴瞑不欲視目中淚出太息癲疾短氣不閉莖中痛面色蒼蒼黑短氣嘔血胸背痛心痛數數心悲不樂婦人月事不利見赤白而有身反敗隂寒振寒溲白尿難痛大衝二穴在足大指本節後二寸或一寸半陷中灸三壯主腰引少腹痛小便不利狀如淋㿉疝少腹腫溏泄遺溺隂痛面蒼色胸脅支滿足寒大便難嘔血女子漏血不止小兒猝疝嘔逆發寒嗌乾肘腫內踝前淫濼䯒痠腋下腫馬刀痿脣腫善渴喉中鳴不得尿隂上痛溏泄泄血面陳黑中封二穴在足內踝前一寸仰足取之陷中伸足乃得之灸三壯主瘧痎色蒼蒼振寒少腹腫食怏怏繞臍痛足逆冷不嗜食身體不仁寒疝引腰中痛或身微熱小腹痛振寒溲白尿難痛嗌乾善渴身黃有微熱少氣身重濕內踝前痛膝腫瘈厥身體不仁􅒃疝癃暴痛痿厥咽偏腫不可以咽蠡溝二穴在足內踝上五寸灸三壯主暴疝少腹腫時少腹猝痛小便不利如癃閉數噫恐悸少氣不足腹中痛悒悒不樂咽中悶如有瘜肉狀背拘急不可俯仰女子赤白淫下時多時少暴腹痛刺中都二穴在內踝上七寸䯒骨中與少隂相直又名中郤灸五壯主腸澼潰疝少腹痛婦人崩中因惡露不絶足下熱脛寒不能久立濕痺不能行膝關二穴在犢鼻下二寸陷中灸五壯主風痺膝內痛引臏不可屈伸喉咽中痛曲泉二穴在膝輔骨下大筋上小筋下陷中屈膝乃得灸三壯又云在膝屈內外兩筋間宛宛中又云在膝曲橫紋頭主治女子血瘕按之如湯浸股內少腹腫隂挺出丈夫㿉疝隂股痛小便難腹脅支滿癃閉少氣泄利四肢不舉實即身熱目眩痛汗不出目昏昏膝痛筋攣不可屈伸發狂衄血喘呼少腹痛引喉咽頭風勞失精身體極漏泄水下利膿血隂腫節痛隂包二穴在膝上四寸股內廉兩筋間灸三壯主腰尻引少腹痛氣溺不禁五里二穴在氣衝下三寸隂股中動脈灸五壯主陽中滿熱閉不得溺主嗜卧四肢不得動搖隂亷二穴在羊矢下去氣衝二寸動脈中炙三壯主婦人絶産若未經生産者炙三壯即有子足少隂腎經十穴湧泉二穴在足心陷中屈足捲指宛宛中又云在腳心大拇指下大筋炙二壯主腰痛大便黃心中結熱風疹風痛心痛不嗜食婦人無子短氣咳嗽身熱喉痺胸膈滿目眩男子如小女子如妊娠五指端盡痛足不得履地引入腹中痛喉痺哽噎寒熱咽中痛不可食然谷二穴在足內踝前起骨下陷中炙三壯主咽內腫心恐懼如人將捕涎出喘呼少氣足跗腫不得履地寒疝小腹脹上搶胸脅咳唾血喉痺淋瀝女子不孕男子精溢䯒痠不能久立一足寒一足熱舌縱頰滿消渴初坐小兒臍風口噤痿厥洞泄胸中寒脈代時不至溫瘧汗出隂上縮內腫氣咽喉而不能言舌下腫難言舌縱挺出不嗜食太溪二穴在內踝後跟骨上動脈陷中灸三壯主久瘧咳逆心痛如錐刺其心手足寒至節喘息者死嘔吐口中如膠善噫寒疝熱病汗不出默默嗜臥溺黃消痺大便難咽腫唾血痃癖寒熱咳嗽不嗜食腹脅痛瘦弱手足逆冷久疝瘕積聚與隂相通及足清不仁熱病多汗黃疸多熱少寒腹中腫脹大鍾二穴在足跟後衝中灸三壯主實則小便淋閉灑灑腰脊強痛大便祕澀嗜臥口中熱虛則嘔逆多寒欲閉戶而處少氣不足胸脹喘息舌乾咽中食噎不得下善驚恐不樂喉中鳴咳唾血腹滿便難多寒少熱水泉二穴去太溪下一寸在內踝下灸五壯主月事不來來即多心下悶痛目昏昏不能逺視隂挺出小便淋瀝腹中痛照海二穴在足內踝下灸三壯主嗌乾四肢懈怠惰善悲不樂久瘧猝疝少腹痛嘔吐嗜卧大風偏枯半身不遂女子淋瀝隂挺出隂暴起疝少腹熱而偏痛大風默默不知所痛視如不明復溜二穴在足內踝上二寸陷中灸五壯又名冒陽伏白主腰脊十分痛不得俯仰起坐目昏昏視不明口舌乾涎自出足痿不能履䯒痠不自溫腹中雷鳴腹脹如鼓四肢腫十水病溺青赤黃白青取井赤取榮黃取腧黑取合血氣泄後腫五淋小便如散火骨寒熱汗注不止腳後亷急不可前却足胕上痛風逆四肢廢交信二穴在內踝上二寸少隂前太隂後廉前筋骨間灸三壯主氣淋㿉疝隂急股引腨內廉骨痛泄痢赤白女子漏血不止築賔二穴在內踝上腨分中灸五壯主小兒胎疝痛不得乳癲疾狂言嘔吐沫足腨痛久疝絶子隂谷二穴在膝內輔骨後大筋下小筋上按之應手屈膝中取之灸三壯主膝痛如錐不能久立痰涎下煩逆溺難言主舌下腫及股內廉痛婦人漏下心腹脹滿不得息小便黃男子如女子如妊娠寒熱腹偏腫脊內廉痛隂痿明堂灸經卷八
