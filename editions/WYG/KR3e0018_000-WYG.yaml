body:
  text: 明堂灸經醫家類提要臣等謹案明堂灸經八卷題曰西方子撰不知何許人與銅人針灸經俱刋于山西平陽府其書専論灸法銅人惟有正背左右人形此則兼及側伏較更詳宻考唐志有黄帝十二經明堂偃側人圖十二卷兹或其遺法歟其曰明堂者錢曾讀書敏求記曰昔黄帝問岐伯以人之經絡盡書其言蔵于靈臺之室洎雷公請問乃坐明堂授之後世言明堂者以此今醫家記鍼灸之穴為偶人㸃志其處名明堂非也今考舊唐書經籍志以明堂經脉别為一類則曽之説信矣古法多鍼灸並言或惟言鍼或言鍼以該灸靈樞稱鍼經是也自王燾外臺秘要始力言誤鍼之害凡鍼法鍼穴俱刪不録惟立灸法為一門此書言灸不言鍼葢猶燾志也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4b914ad40a52d5b2be8b4deb236811fa8cc7e392b47cbb0c250f641c73716171
