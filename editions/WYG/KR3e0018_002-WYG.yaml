front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0018_WYG_002-1a, image: WYG0738/WYG0738-0063c.png}
body:
  text: 明堂灸經卷二手太陰肺經十穴少商二穴在手大指端内側去爪甲如韭葉灸三壯銅人不灸主痎瘧主喉中鳴主嘔吐主手不仁振慄鼔頷主欬逆喘主脇下脹主耳前痛主煩心善噦心下滿汗出而寒魚際二穴在手大指本節後内側散脈中灸三壯主胃逆霍亂主唾血吐血主痺走胷背不得息喉中焦乾舌黃主肘攣注滿主痓痙氣失瘖不能言主狂言主熱病振慄鼓頷鼔滿陰痿色不變頭痛不汗出洒淅惡風寒目眩腹痛不下食欬引尻痛太泉二穴在手掌後陷者中又名太淵灸三壯主胷痺逆氣寒厥善噦嘔飲水欬嗽煩怨不得卧肺膨脹臂内亷痛目生白翳眼眥赤筋缺盆中引痛掌中熱數欠喘不得息噫氣上逆心痛唾血振寒咽乾狂言經渠二穴在寸口陷者中不灸列缺二穴在踠上一寸半灸三壯主偏風半身不舉口喎肘臂痛腕勞及痎瘧主汗出四肢腫小便熱痛主手臂身熱主肩背寒慄少氣不足以息寒厥交無故而驚凡實則肩背汗出四肢暴腫虚則肩寒慄氣不足以息四肢厥喜笑身􅀈搖時時寒主熱癎驚而有所見主熱病煩心悶悶先手擘身熱瘈瘲唇口聚鼻張目下汗出如珠寒熱掌中熱主瘧寒熱及喉痺欬𠻳不止又瘧甚熱口噤不開孔最二穴在腕上七寸灸五灸主熱病汗不出肘擘厥痛伸難手不及頭不握天澤二穴在肘中約上動脈灸三壯甄權云不宜灸小兒慢驚灸一壯主舌乾脇痛主短氣心煩主腹脹喘振慄主嘔泄下上出兩脅下痛主癲病不可向手擘不得上頭喉痺欬逆上氣呼吸多唾澤沫膿血主掣痛手不可伸主肘痛時寒肩背寒痓肩甲内亷痛氣膈喜嘔鼓頷不得汗煩心身痛四肢暴腫狹白二穴在天府下去肘五寸動脈灸五壯主欬乾嘔煩滿主心痛氣短天府二穴在腋下三寸灸五壯主身脹逆息不得卧風汗身腫喘息多唾主上息喘不得息主喘逆上氣呼吸肩息不知食味卒中惡風邪氣飛尸惡鬼語遁尸瘧病瘤癭氣咽腫泣出盲目眩逺視􅍃􅍃臑㑹二穴在臂前亷去眉頭三寸主瘤癭氣咽腫主寒熱頭瘰厯癲疾􅀈氣肘節痺臂酸重腋急痛肘難屈伸臂痛不能舉手厥陰心主經八穴中衝二穴在手中主指去爪甲如韭葉陷者中主肘中痛主舌本痛主熱病煩心心悶而汗不出掌中心熱心痛身熱如火浸淫煩滿頭痛如破主神氣不足失忘勞宫二穴在掌中央動脈灸三灸主喉嗌痛主大便血不止尿血及赤主渇食不下主嘔吐主風熱善怒心中悲喜思慕歔欷喜笑不主手痺主熱病三日已往不得汗怵惕胷脅不可反側欬溺溺赤小便血衂不止嘔吐血氣逆噫不止嗌中痛食不下善渇口中爛掌中熱欲嘔主黃疸目黃主熱㽲大陵二穴在掌後兩骨間灸二壯主喉痺嗌乾主心痛主目赤小便如血欬逆寒熱發主手掣手攣及肘攣腋腫主風熱善怒心中悲喜思慕歔欷喜笑不止主心下澹澹喜驚主熱病煩心心悶悶汗不出掌中熱頭痛身熱如火浸淫煩滿舌本痛主瘧乍寒乍熱主欬喘主嘔血主胷中痛主痂疥内關二穴在掌後二寸去腕手心主面赤熱主目􅍃􅍃昏夜無所見主目赤支滿中風肘攣實心暴痛虚則心煩惕惕間使二穴在掌後二寸兩筋間灸七寸主心胷痺背相引主心懸如飢主嗌中如扼主肘内亷痛主熱病煩心喜噦胷中澹澹喜動為熱惡風寒嘔吐怵惕寒中少氣掌中熱多驚瘖不得語腋腫肘攣卒心痛郄門二穴在掌後去腕五寸灸五壯主心痛主衂血嘔血主驚恐畏人神氣不足曲澤二穴在肘内亷下陷者中屈肘得之灸三壯主心痛主逆氣嘔涎或血主掣痛手不可伸主心下澹澹喜驚主傷寒温病身心熱口乾肘瘈善搖頭顔清天泉二穴在腋下二寸舉腋取之灸三壯主欬逆主心病胷脅肢滿膺背脾間臂内亷動手少陰心經八穴少衝二穴在手小指内亷之端去爪甲如韭葉灸三壯又名經始主胷痛口熱咽酸乍寒乍熱主咽酸主太息煩滿痰冷少氣悲驚主熱病煩心心悶而汗不出掌中熱主上氣平心痛悲恐畏人善驚手拳不得伸引肘腋痛主身熱如火浸淫煩滿舌本痛主驚癎吐舌沫出少府二穴在手小指大節後陷者宫直勞中大節又作本節灸十壯主嗌中有氣如息肉狀主小便不利癃主數噫恐悸氣不足主陰痛實時挺長寒熱陰暴痛遺尿偏虚則暴癢氣逆及主煩滿少氣悲恐畏人掌中熱肘腋攣急胷中痛手拳不能伸神門二穴在掌後鋭骨端陷者中灸七壯主笑若狂主手掣肘攣主遺尿主喉痺心痛數噫恐怖少氣不足主瘧心熱甚欲得飲冷惡寒則欲處温中咽乾不嗜食手臂寒喘逆身熱狂悲哭大小人五癎陰郄二穴在掌後動脈中去腕半寸灸七壯主氣驚心痛主失瘖不能言洒淅振寒厥逆霍亂胷中滿衂血驚恐通理二穴在腕後一寸灸三壯主頭眩痛目眩面赤而熱心悸肘腕酸重及暴瘂不能言少氣熱病煩心心中懊憹數欠頻伸心下悸悲恐主遺溺主熱病先不樂數日主臂臑痛實則支腫虚則不能言靈道二穴在掌後一寸半灸三壯主心痛悲恐相引瘈瘲主肘攣榰滿主暴瘖不能語言少海二穴在肘内亷節後陷中灸三壯主頭痛汗出寒熱不惡寒主肩臂不舉不能帶衣項強急痛不可以顧主齲齒主氣逆呼吸噫噦嘔羊癲疾羊癎吐舌羊鳴戾頸主手臂攣主瘧振寒項痛引肘腋痛引少腹中四肢不舉主目眩發狂目黃脇痛極泉二穴在腋下筋間動脈入胷灸七壯主心痛乾嘔四肢不收咽乾煩渇臂肘厥寒目黃脇下滿明堂灸經卷二
