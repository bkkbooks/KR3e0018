body:
  text: 明堂灸經卷七側人頭頸二十穴頷厭二穴在曲周顳顬上亷灸三壯主風眩目無所見偏頭痛引目外眥急耳鳴好嚏頸痛懸顱二穴在曲周顳顬中灸三壯主熱病偏頭痛引目内眥身熱煩滿汗不出齒痛面皮赤痛懸釐二穴在曲周顳顬下亷灸三壯主面皮赤痛癲疾互引善驚羊鳴熱病偏頭痛引目外眥赤痛煩滿汗不出熱病天衝二穴在耳如前三寸乃天衝灸三壯主主頭痛癲疾風癎牙齗腫善驚恐率谷二穴在耳上入髪際一寸半灸三壯主煩滿嘔吐醉傷酒風熱發兩目眩痛膈胃寒痰腦角弦痛不能飲食曲鬢二穴在耳上髪際曲隅陷中鼓頷有空灸七壯主暴瘂不能言齒齲頰頷腫引牙車不得開急痛口噤角孫二穴在耳郭中間開口有空灸三壯主頸腫項痛不可顧頸頷柱滿牙齒不能嚼齲痛腫目生膚翳和髎二穴在耳前兊髪下橫動脈灸三壯主風頭重痛牙車引急耳中嘈嘈頷頰腫耳門二穴在耳前起肉當耳缺灸三壯主耳痛鳴聾耳有膿汗出生瘡猝耳鳴如蟬齒齲痛聽㑹二穴在耳前陷中張口得之上關下一寸動脈灸五壯主聾嘈嘈若蟬鳴齒痛惡食癲疾嘔吐骨痠眩狂瘈瘲口噤喉鳴牙車急痛牙車脫臼聽宫二穴在耳中珠子大如赤小豆灸三壯主耳嘈嘈若蟬鳴骨痠眩狂瘈瘲口噤喉鳴耳聾如物填塞心腹痛滿臂痛失聲天容二穴在耳下曲頰後又名大容灸三壯主頸項癰不能言頸腫項痛不可顧耳嘈嘈若蟬鳴欬逆嘔沫主氣喘息齒禁喉痺寒熱咽如鯁天牖二穴在頸筋缺盆上天容後天柱前完骨下髪際上一寸不灸缺盆二穴在肩上横骨陷中又名天蓋灸三壯至缺盆中痛汗出喉痺咳寒熱瘰癧缺盆中腫外潰則生缺中熱及滿腹大水氣哽噎胷熱息賁脇下氣上衝扶突二穴在氣舍後一寸半灸三壯主舌本出欬逆上氣咽中鳴喘多唾喘飲喉中如水雞鳴天䆫二穴在頸大筋前曲頰下扶突後動脉應手䧟中灸三壯又名䆫簧主耳鳴聾無所聞頰腫喉中痛暴瘖不能言主肩痛引項不得回顧耳痛及痛漏頸痛天鼎二穴在頸缺盆直扶突曲頰下一寸人迎後炙三壯主暴瘖氣哽咽喉痺腫不得息飲食不下喉中鳴人迎二穴在頸大脈應手夾結喉傍以侯五藏氣又名為五舍炙之不善傷人水突二穴在頸大筋前直人迎下氣舍上又名水門炙三壯主欬逆上氣咽喉癰腫呼吸短氣喘息不得卧氣舍二穴在頸直人迎夾天突陷中炙三壯主欬逆上氣瘤癭喉痺咽腫頸項强不得回顧肩腫哽咽食不下不下脅痛不得卧煩熱口乾不嗜食胷脅支滿喘息心痛不得轉側傷飽身黄羸瘦賁豚腹腫脊强四肢懈惰善恐少氣厥逆肩臂不舉欬逆吐食噦噫食入還出熱中苦吞而聞食臭寒中洞泄不化胷滿嘔無所出身潤石水身腫諸漏京門二穴在監骨腰中季肋本俠脊又名氣俞氣缺主腰痛不得俛仰寒熱腫脹引背不得息水道不利溺黄小腹急痛腫腸鳴洞洩髀樞引痛肩背寒痓肩甲内亷痛脊痓反折體痛帶脈二穴在季肋一寸八分灸五壯主婦人小腹堅痛月脈不調帯下赤白裏急瘈瘲五樞二穴在帶脈下三寸一云水道下一寸半灸五壯主男子寒疝隂卵上入小腹痛婦人赤白裏急瘈瘲維道二穴在章門下五寸三分灸三壯主嘔逆不止三焦不調水腫不嗜食欬逆不止居膠二穴在長平下八寸三分監骨上陷中灸三壯主腰小小腹痛肩引胷臂攣急手臂不得舉而至肩泉腋二穴在腋下三寸宛宛中舉臂得之又名淵腋不炙大包二穴在泉腋下三寸脾之大絡布胷脅中出九肋閒炙三壯主腹有大氣氣不得息胷脅中痛内實則其身盡寒虚則百節皆縱輒筋二穴在腋下三寸腹前一寸著脅炙三壯主胷中暴滿不得卧喘息天池二穴在乳後一寸腋下著脅又名天㑹炙三壯主寒熱胷膈煩滿頭痛四肢不舉腋下腫上氣胷中有聲喉中鳴手陽明大腸經二十穴商陽二穴在手大指次指内側去爪甲如韭葉又名絶陽主胷中氣滿喘欬支腫熱汗不出耳鳴耳聾寒熱缺頷腦齒痛惡寒肩背急相引缺盆痛目青者可灸三壯左取右右取左如食頃立已胷脅支滿二間二穴在手大指次指本節前内側陷中又名聞谷灸三壯主喉痺頷腫肩背痛振寒鼻鼽衂血多驚口喎目眥傷寒熱三間二穴在手大指次指本節之後内側陷中灸三壯又名少谷主喉痺咽中如鯁齒齲痛嗜卧胷滿腸鳴洞洩寒瘧唇焦口乾氣喘目眥急痛目上挿頭熱鼻齀衂血吐舌戾頸喜驚氣熱身熱喘瘧病合谷二穴在大指次指岐骨陷中又名虎口灸三壯主寒熱瘧鼻衂熱病汗不出目視不明頭痛齒齲喉痺痿臂面腫唇吻不收瘖不能言口噤不開婦人妊娠不可刺損胎氣主風頭熱鼻清涕出陽谿二穴在腕中上側兩筋間陷中又名中魁灸三壯主狂言喜笑見鬼熱病煩心目風赤爛有翳厥逆頭痛胷滿不得息寒熱瘧疾喉痺耳鳴齒痛驚掣肘臂不舉痂疥目痛耳痛鳴聾咽如硬吐舌戾頸妄言心悶而汗不出掌中熱心痛身熱浸淫煩滿舌本痛偏歴二穴在腕後三寸灸三壯主寒熱瘧風汗不出目視昏昏癲疾多言耳鳴口喎齒齲喉痺嗌乾鼻齀衂血温溜二穴在腕後約去五寸又云六寸又名温溜蛇頭又名逆缺蛇頭灸三壯主口喎腸鳴腹痛傷寒身熱頭痛噦逆肩不得舉癲疾吐涎狂言見鬼喉痺面缺腫主狂仆主瘧面赤腫下亷二穴在輔骨下去上亷一寸輔兊肉其分外斜灸三壯主頭風臂肘痛溺黄腸鳴相追逐上亷二穴在三里下一寸灸五壯主腦風頭痛小便難黄赤腸鳴氣走注痛三里在曲池下二寸按之肉起兊肉之端灸三壯二穴主手臂不仁肘攣不伸齒痛頰頷腫瘰癧曲池二穴在肘外輔骨屈肘曲骨之中以手拱胷取之灸大良灸三壯主肘中痛時寒偏風半身不遂刺缺癮疹喉痺不能言胷中煩滿筋緩捉物不得挽弓不開屈伸難風臂肘細而無力傷寒餘熱不盡皮膚乾燥頭痛手不可舉重腕急肘節痺痠重腋急痛腕外側痛脫如拔肩重痛不舉身濕搖時時寒瘈瘲癲疾寒熱渴肘膠二穴在肘大骨外亷陷中灸三壯主肘節風痺臂痛不可舉屈伸攣急五里二穴在肘上三寸行向裏大脈中央可灸十壯主風勞驚恐吐血肘臂痛嗜卧四肢不能動搖寒熱瘰癧欬嗽目視昏昏痎瘧心下脹滿而痛上氣臂臑二穴在肘上七寸胭肉端灸三壯主寒熱頸項拘急瘰癧肩臂痛不得舉肩髎二穴在肩端臑上斜舉取之灸三壯主臂重不可舉臂痛秉風夾天髎外肩上小􅀈後舉臂有空灸三壯主肩痛不能舉肩井二穴在肩上陷解中缺盆上大骨前一寸半以三指按取之當中指下陷中又名髆井灸三壯七壯主五勞七傷頸項不得回顧背髆悶兩手不得向頭或因撲傷腰髖疼脚氣上攻婦人墮胎後手足厥逆欬逆寒熱悽索氣不得卧天髎二穴在肩缺盆中上毖骨之際陷中央灸三壯主肩肘痛引頸項急寒熱缺盆中痛汗不出胷中煩滿臂痛不舉肩􅀈二穴在肩端兩骨間陷者宛宛中舉臂取之可灸七壯至二七壯以差為度若灸偏風不遂可七七壯不宜多灸恐臂細若風病筋骨無力不瘥當灸不缺細主療偏風不遂熱風癮疹手臂攣急捉物不得臂細無力筋骨痠疼肩中熱頭不可以顧巨骨二穴在肩端上行兩骨間陷中主背髆痛胷中瘀血肩臂不能屈伸而痛臂不得伸肩中痛不能動摇明堂灸經卷七
