body:
  text: 明堂灸經卷一正人頭面三十六穴頭部中行四穴上星在顱上直鼻中央入髮際一寸陷容豆日灸三壯至百五壯止多灸拔氣令人眼暗主頭風頭腫皮腫面虛鼻塞頭痛面赤腫目眩痰瘧振寒熱汗不出目睛痛不能逺視𩕄㑹在上星後一寸陷者中日灸二七壯七日停初灸之即痛五十壯不痛主療鼻塞不聞香臭頭風痛白屑起多睡驚癎戴目上不識人目眩面腫前頂在𩕄㑹後一寸半骨陷中主頭風熱痛頭腫風癎小兒驚癎面赤腫鼻多清涕項痛目眩百㑹在前頂後一寸半頂中心灸百五壯即停三五日訖繞四畔以三稜針刺令出血以井花水淋之令宣氣通頻灸拔氣上令眼暗主脫肛風癎青風心風角弓反張羊鳴多哭言語不擇發時即死吐沫心中熱悶頭風多睡心煩驚悸無心力忘前失後喫食無味頭重飲酒面赤鼻塞目泣出耳鳴聾頭第二行三穴五處二穴在頭上去上星傍一寸灸五壯止主目不明頭風目眩脊強反折瘈瘲癲疾頭痛承光二穴在五處後一寸明堂云二寸不灸通天二穴在承光後一寸半灸三壯主項痛重暫起仆僵鼻塞喘息不利口喎僻多涕鼽衄有瘡頭第三行三穴臨泣二穴在目上眥直入髮際五分陷者中主風不識人風眩鼻塞腋下腫喜齧頰胸痺心痛不得反側瘧日西發脅下痛胸痺目翳多淚目窗二穴在臨泣後一寸灸五壯主諸陽之熱逆頭痛寒熱汗出不惡寒目眩瞑唇吻强上齒齲痛目外眥赤􅀈􅀈逺視不明正營二穴在目窗後一寸灸五壯主諸陽之熱正面部中行七穴神庭在髮際直鼻上督脈上一寸髮際灸二七壯至百壯主腫氣風癎癲風不識人羊鳴角弓反張披髮而上歌下哭多學人言語驚悸不得安寢頭痛喘渴目不可視目泣出鼻清涕出素髎在鼻柱端不宜灸水溝在鼻柱下人中灸三壯主消渴飲水無多少水氣遍身腫失笑無時節癲癎語不識尊卑乍喜乍笑牙關不開面腫唇動葉葉肺風狀如蟲行寒熱頭痛喘渴目不可視鼻不聞香臭口喎僻不能開水漿不禁瘖不能言寒熱卒中惡風水面腫兑端在唇上端灸三壯主唇吻强上齒齲痛主癲疾吐沫小便黃舌乾消渴衄血不止齗交在唇內齒上齗縫灸三壯主鼻窒喘息不利鼻喎僻多涕鼽衄有瘡鼻息肉鼻頭額頞中痛鼻中蝕瘡口不能禁水漿喎僻口噤不開項如拔不可左右顧面赤頰中痛心煩痛頸項急小兒面瘡久不可承漿在頥前下唇之下宛宛中灸四十九壯停四五日灸多則恐傷陽明脈斷令風不差此艾炷止一分半大主癢偏風口喎面腫消渴面風口不開口中生瘡目眩瞑小便黃或不禁消渴嗜飲及暴啞不能言廉泉在頷下結喉上舌本間灸三壯主舌下腫難言舌瘲涎多咳嗽少氣喘息嘔沫口禁舌根急縮下食難面部第二行六穴曲差二穴俠神庭傍一寸半在髮際灸七壯主心中煩滿汗不出頭項痛身熱目視不明攢竹二穴在眉頭陷中不灸精明二穴在目內眥外頭畔陷者宛宛中不灸巨髎二穴夾鼻傍八分直瞳子蹻脈灸七壯主療風寒鼻凖上腫癕痛招搖視占瘈瘲口僻目淚出多赤痛癢生白翳覆瞳子迎香二穴在禾髎上一寸鼻孔傍五分不灸禾髎二穴直鼻孔下夾水溝傍五分主鼻窒口僻鼻多清涕出不可止鼽衄有瘡口噤不開面部第三行五穴腸白二穴在眉上一寸直瞳子主目瞳子痛癢逺視昏昏昏夜無所見目系急目上插頭目痛目眵背腠寒栗承泣二穴在目下七分直瞳子不灸四白二穴在目下一寸灸七壯主頭痛目眩目眴淚出多䁾內眥赤痛癢生白膚翳目瞤動不息地倉二穴俠口傍四分外如近下有脈微動者是日灸二七壯在肝七七壯艾炷如二分若大令人口轉喎如欲治灸承漿七七壯忌房事毒食主偏風口喎失音不言不得飲水漿食漏落脈瞤動大迎二穴在曲頷前一寸二分骨陷中動脈灸三壯主口噤不開引鼻中口緩不收不能言口失缺下牙齒痛惡寒寒熱頭痛瘰癧口喎數缺氣風癧口噤牙疼頰頷腫惡寒風壅面浮腫目不閉唇瞤動面部第四行三穴本神二穴在曲差傍一寸半髮際一云直耳上入髮際四分主痛癲疾嘔吐涎沫小兒驚癎絲竹空二穴在眉後陷中不灸瞳子髎二穴在目外去眥五分又名太陽又名前關銅人云可灸二壯西方子曰不可灸面部第五行五穴頭維二穴在額角髮際本神傍一寸半不灸顴髎二穴在面顴骨下下亷陷中主目赤黃口喎僻不能言及口僻痛惡風寒不可以嚼齒痛惡寒面赤眼瞤動不止頻腫上關二穴在耳前上亷起骨開口取又名客主人灸三壯主青盲無所見耳痛鳴聾口喎僻不能言唇吻強瘈瘲口沫出目眩牙車不開口噤下關二穴在客主人下耳前動脈下空下亷合口有空張口則閉灸三壯主耳痛鳴聾下牙齒痛齒齲痛耳有濃汁口喎頰車二穴在耳下曲頰端陷者中灸三壯主口癖痛惡風寒不可以嚼失瘖牙車疼頷頰腫頸強不得回顧胸部中央直下七穴天突在頸結喉下五寸宛宛中陰維任脈之㑹主咳嗽上氣噎胸中氣喉內狀如水雞聲肺癰唾膿血氣壅不通喉中熱瘡不得下食夾舌本脈青暴怖氣哽喉痺咽乾急咳逆喘暴及肩背痛及漏頸痛旋璣在天突一寸陷者中仰頭取之任脈氣之所發灸五壯主胸皮滿痛喉痺咽水漿不下華蓋在璇璣下一寸陷中仰而取之任脈氣之所發灸五壯主胸脅肢滿痛引胸中咳逆上氣喘不能言紫宫在華蓋下一寸六分陷中仰而取之亦任脈氣之所發灸五壯主胸脅肢滿痛膺骨疼飲食不下嘔逆上氣煩心玉堂在紫宫下一寸六分陷中又名玉英任脈氣之所發灸五壯主胸滿不得喘息膺疼骨疼嘔逆上氣煩心主吐寒痰膻中在玉堂下一寸六分陷中又名元兒橫直兩乳間任脈氣之所發灸七壯至七七壯止主肺癰咳嗽上氣唾膿不得下食胸中氣滿如塞中庭在膻中下一寸六分陷中任脈氣之所發灸五壯主胸脅肢滿心下滿食飲不下嘔逆吐食還出胸部第二行腧府二穴在巨骨下去璇璣傍各二寸陷中仰而取之灸五壯主咳逆上氣嘔吐胸滿不得食或中二穴在腧府下一寸六分陷中仰卧取之灸五壯主胸脅肢滿咳逆喘不能食飲上氣涎出多唾呼吸喘悸坐不安席神藏二穴在或中下一寸六分陷中仰而取之灸五壯主胸脅肢滿咳嗽不得息嘔吐胸滿不得食靈墟二穴在神藏下一寸六分陷中仰而取之灸五壯主胸脅肢滿引胸不得息嘔吐胸滿不得食神封二穴在靈墟下一寸六分灸五壯主胸滿不得息咳逆乳癰灑淅惡寒步郎二穴在神封下一寸六分仰而取之灸五壯主胸脅支滿鼻不通呼吸少氣喘息不得舉臂胸部第三行氣户二穴在巨骨下夾腧府兩旁各二寸陷中仰而取之灸五壯主胸脅注滿喘逆上氣呼吸有息不知食味庫房二穴在氣户下一寸六分仰而取之灸五壯主胸脅支滿咳逆上氣呼吸不至息及肺寒咳喘唾膿血屋翳二穴在庫房下一寸六分陷中仰而取之灸五壯主身腫皮痛不可近衣淫濼瘈瘲不仁主咳逆上氣呼吸多唾濁沫膿血膺窗二穴在屋翳下一寸六分陷中灸五壯主胸脅癰腫及腸鳴泄注及乳癰寒熱短氣卧睡不安乳中二穴禁不灸乳根二穴在乳下一寸六分陷中仰而取之灸五壯主胸中滿痛及膺腫乳癰悽索寒熱痛不可安仰胸部第四行雲門二穴在巨骨下夾氣户兩傍各二寸陷中灸五壯主嘔逆上氣胸脅徹背痛主喉痺胸中煩滿咳喘不得息不得舉臂胸脅短氣上衝心中府二穴在雲門下一寸六分乳上三肋間動脈應手陷中灸五壯又名膺中腧主喉痺胸滿塞寒熱胸中滿痛面腹腫及膈寒食不下嘔吐還出及肺系急咳輒胸痛主上氣咳唾濁涕肩背痛風汗出腹脹食飲不下憡憡詹熱周榮二穴在中府下一寸六分陷中仰而取之灸五壯主胸脅支滿不得俯仰咳唾膿咳逆上氣呼吸多唾澤沫膿血飲食不下胸卿二穴在周榮下一寸六分陷中仰而取之灸五壯主胸脅肢滿引胸背痛卧不得轉側天溪二穴在胸卿下一寸六分陷中仰而取之灸五壯主乳腫癰潰主胸中滿痛咳逆上氣喉中作聲主乳腫賁膺食竇二穴在天溪下一寸六分舉臂取之灸五壯主胸脅肢滿膈間雷鳴滀陸常有水聲腹中第一行鳩尾在臆前敝骨下五分禁不灸巨闕下鳩尾下一寸日灸七壯至七七壯主心中煩悶熱病胸中痰飲息賁唾血風癲浪言或作鳥鳴聲不能食無心力凡心痛有數種冷痛蛔蟲心痛蠱毒霍亂不識人及腹中滿暴痛汗出及手清臂不舉上管在巨闕下一寸去鳩骨三寸日灸二七壯至一百壯止不差更倍之主心中熱煩賁豚氣脹滿不能食霍亂心痛不可眠卧吐利心中驚悸心中悶發噦伏梁氣狀如覆杯及風癎熱痛宜可瀉之主身熱汗不出主三蟲多涎中管在上管下一寸又名大倉上紀胃之幕日灸二七壯至四百壯止主心匿不能食反胃霍亂心痛熱缺痎瘧天行傷寒因讀書得奔豚氣心悶伏梁氣如覆杯冷氣腹中熱喜渴涎出是蛔以手聚而按之堅將及腹脹不通崖大便堅憂思損傷氣積聚腹中甚痛作膿腫往來上下及脅下堅痛及鼻聞焦臭頭熱鼻鼽衄及主寒中傷飽食飲不化及目黃振寒及衝疝冒死不知人事背與心相控而痛飲水過多喘脹建里在中管下一寸二分不通灸下管在建里下一寸日灸二七壯至二百壯止主腹胃不調腹內刺不能食腸堅腹痛胃脹癖塊脈厥厥動日漸瘦羸六腑氣寒穀食不轉水分在下管下一寸臍上一寸若是水病灸之大良日灸七壯至四百壯主腹腫不能食腸堅腹痛胃脹不調堅硬主水腫主痛繞臍衝胸不得息臍中又名神闕主泄利不止小兒乳痢不絶灸百壯小兒五壯至七壯主腹大繞臍痛水腫鼓脹腸中鳴狀如水聲久冷傷憊陰交在臍下一寸日灸三七壯至七百壯止又名橫户主臍下熱小便赤氣痛狀如刀攪作塊狀如覆杯婦人斷緒月事不調帶下崩中因産後惡露不止繞臍冷痛五藏下氣主臍下疞痛寒疝氣海在臍下一寸半又名脖朠主藏氣虛憊一切氣疾主少腹疝氣遊行五藏腹中切痛及驚不得卧主冷氣衝心女婦惡露不止繞臍痛氣結成塊狀如覆杯小便赤澀石門在臍下二寸女子不灸又名利機精露丹田命門端田灸二七壯至一百壯主腹痛堅硬婦人因産惡露不止遂成結塊崩中斷緒灸之良大便難并大便閉塞氣結心堅滿及小腹堅痛卧陰中不得小便并小腹中拘急及腹中滿暴痛汗出并水脹水氣行皮中小腹皮敦敦然小便黃氣滿不欲食穀入不化及嘔吐并賁豚上氣小腹疝氣遊行五藏疝繞臍衝胸不得息疝積及二丸關元在臍下三寸灸三十壯十日灸三百壯止又名次關下紀至臍下㽲痛小便赤淋不覺遺瀝小便處痛狀如散火尿如血色臍下結血狀如覆杯婦人帶下因産惡露不止斷緒産道及脅下脹及小腹熱而偏痛寒氣入腹及石淋臍下三十六疾不得小便及腸中尿血胞轉氣淋又主小便數及泄痢不止小便滿石水及賁豚氣入小腹暴疝痛身熱頭痛進退往來中極在臍下四寸又名玉泉氣源日灸三七壯至三百壯止主淋小便赤尿道痛臍下結塊如覆杯婦人因産得惡露不止遂成疝瘕或因月事不調血結成塊拘攣腹疝月水不下乳餘疾絶子陰癢子門不端小腹苦寒賁豚搶心饑不能食腹脹經閉不通小便不利及失精及主恍惚及厥煩痛及主小腹積聚堅之如石及饑不能食曲骨在橫骨之上中極下一寸毛際陷中又名屈骨主小便脹血癃小便難主㿗疝小腹痛婦人赤白𢃄下㑹隂在大便前小便後兩隂間又名屏翳主隂頭寒主痔與隂相通者死隂中諸病前後相引痛不得大小便女子經不通男子隂端寒衝心佷佷腹第二行幽門在巨闕傍半寸陷中黃帝明堂云在巨門各二寸半灸五壯主善吐食飲不下兼唾多吐涎乾噦嘔沫及泄有膿血主胸中引痛煩悶健忘少腹脹滿及心中氣逆通谷一穴在幽門下一寸灸五壯主頭痛寒熱汗出不惡寒主項如拔不可左右顧目昏昏不明風寒及鼻鼽清涕出及結積留飲癖囊胸滿飲主喜嘔及心中煩悶數缺癲心下悸咽中淡淡然主失缺口喎食飲善嘔暴啞不能言隂都二穴在通谷下一寸又名食宫灸三壯主多唾嘔沫大便難及婦人無子藏有惡血腹厥痛絞刺不可忍及身熱瘧病主心滿氣逆腸鳴石關二穴在隂都下二寸又名石門灸五壯主多嘔主脊强不舒主大便閉塞氣結心堅滿及脊戾反折主婦人子藏中有惡血內逆滿痛商曲二穴在石關下二寸灸五壯主腹中積聚時切痛不嗜食肓腧二穴在商曲下一寸直臍傍灸五壯主大便乾腹中切痛及大腹寒疝小腹有熱中注二穴在肓腧下五分灸五壯銅人經云在肓腧下一寸主小腹熱大便堅燥不利四滿二穴在中注下一寸婦人藏中或胞中有惡血內逆滿痛疝又名髓府主大腹石小腹中切痛主奔豚上下及臍下疝積婦人諸向惡血㽲痛氣穴二穴在四滿下一寸千金婦人方上卷云在關元左邊三寸是右三寸名子戶灸五壯主月水不通奔泄氣上下引腰脊痛主泄利不止太赫二穴在氣穴下一寸千金腎藏卷云在屈骨端三寸灸五壯又名隂維隂關主男子虛勞失精隂上縮莖中痛灸三十壯女子赤沃橫骨在太赫下一寸千金一名屈骨在隂上橫骨中央宛曲如却月中央是西方子云亦名曲骨灸三壯主失精五藏虛竭主腹脹小便難隂氣縱伸痛腹第三行不容二穴在幽門傍各一寸五分去任脈二寸直四肋端相去四寸灸五壯主腹內痃急不得食腹痛如刀刺兩脅積氣膨膨然主胸背相引痛嘔吐喘咳口乾痰癖脅下痛重肋疝瘕承滿二穴在不容下一寸灸五壯主脅下堅痛及腸鳴腹脹上喘氣逆及脈氣食飲不下梁門二穴在承滿下一寸灸五壯主胸脅下積氣食飲不思大腸滑泄穀不化關門二穴在梁門下一寸灸五壯主遺牙及身腹重主積氣腸鳴卒痛泄利不欲食腹中氣遊走夾臍急痰瘧振寒太乙二穴在關門下一寸灸五壯主癲疾狂吐舌心煩悶滑肉二穴在太乙下一寸又名一謂滑幽門灸五壯主癲疾狂吐舌主嘔逆天樞二穴去肓腧一寸半直臍傍二寸又名長溪長谷循際谷門灸百壯主久積冷氣繞臍切痛時上衝心女子漏下赤白及腹大堅食不化面色蒼蒼主冬月重感於寒則泄當臍痛腸胃間遊氣切痛主腹脹腸鳴氣上衝胸腹中盡痛主面浮腫唾血吐血主痁振寒熱盛狂言語嘔吐霍亂泄利食不化外陵二穴在天樞下半寸灸五壯主腹中盡痛心如懸下引臍腹痛大巨二穴在臍下一寸兩傍各二寸長溪下二寸灸五壯主小腹滿小便難隂下縱主善驚及癲疝偏枯煩渴四肢不舉水道在大巨下三寸灸五壯主三焦結熱大小便不利主肩背痛小腹滿引隂中痛腰背强急膀胱寒歸來二穴在水道下二寸灸五壯主賁豚卵上入引莖痛婦人血藏積冷氣衝二穴在歸來下一寸鼠􅀈上一寸素問刺熱論注云在腹臍下橫骨兩端鼠􅀈上一寸動脈應手灸五壯又名氣衝主㿗隂腫痛隂痿莖中痛兩丸騫痛不可仰卧及大氣石水及腹中滿熱淋閉不得尿主腹中大熱不安腹有天氣正攻心暴腹脹滿癃淫濼臍下堅痛疝婦人月水不通無子或暴閉塞腹脹滿癃淫濼乳難子上搶心若胞不出衆氣盡亂絞痛不得反息腹第四行期門二穴在第二肋端不容傍一寸半上直兩乳灸五壯主目青而嘔主胸中熱主脅下脹心痛氣短喜障酸主腹大堅不得息脹痺滿少腹尤大及小腹滿小便難隂下縱主飲食不下賁豚上下傷食腹滿及霍亂泄注大喘不得安卧及婦人産餘疾日月二穴在期門下五分灸五壯主少腹熱欲走太息喜怒不常多言語唾不出四肢不收腹哀二穴在日月下一寸半不灸大橫二穴在腹哀下二寸直臍傍甲乙經云三寸五分灸五壯主腹熱欲走大息四肢不可動多汗洞利大風逆氣多寒善愁腹結二穴在大橫下一寸三分又名臨窟灸五壯主縍臍痛搶心腹寒泄利咳逆府舍二穴在腹結下三寸灸五壯主疝痛脾中急痛循脅上下搶心腹滿積聚厥氣霍亂衝門二穴上去大橫五寸在府舍下橫骨兩端約中灸五壯主寒氣滿腹積痛疼淫濼隂疝難乳子上衝心不得息明堂灸經卷一
