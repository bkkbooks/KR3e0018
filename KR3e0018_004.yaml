body:
  text: 明堂灸經卷四伏人頭上第一行五穴後頂在百㑹後一寸半枕骨上又名交衡灸五壯主風眩目視昏昏額顱上痛頂惡風寒諸陽之熱逆癲疾嘔強間在頂後一寸半又名大羽灸七壯主頭如針刺不可以動項如拔癲疾嘔癎發瘈瘲狂走不得卧心煩吐涎沫發無時腦户在枕骨上強間後一寸半又名仰風㑹顱不灸風府在頂後入髮際一寸大筋內宛宛中不灸瘖門在頂後髮際宛宛中不灸伏人頭上第二行胳却二穴在通天後一寸半又名腦蓋主癲疾嘔狂走瘈瘲恍惚不樂目盲內障無一見腹脹滿不得息主暫起僵仆頭旋耳鳴玉枕二穴在胳却後一寸半夾腦户傍一寸三分起肉枕骨上入髮三寸灸三壯主目內目系急痛失枕頭重項痛風眩目痛不能視頭寒多汗耳聾鼻盲頭半寒痛項如拔不可左右顧目上插卒起僵仆惡見風寒汗不出悽厥惡寒腦風不可忍天柱二穴夾項後髮際大筋外亷陷中日灸七壯至百五十壯止主頭痛目不明目如脫目淚出鼻不知香臭風眩卒暴癎眩狂言不休目上及項如拔項疼急煩滿汗不出足不仁身肩背痛欲折頭旋腦痛伏人頭上第三行承靈二穴在正營後一寸半主鼻衄窒喘息不通腦風頭痛惡風寒腦空二穴在承靈後一寸半夾玉枕傍枕骨下陷中又名顳顬灸三灸主鼻管疸發為厲鼻勞癲疾失溲頭痛頭目瞑癲疾及寒熱引項強急鼻衄不止耳蟬鳴聾腦風頭痛不可忍心悸目眩癲疾羸疾體熱項强不得回顧魏武患頭風發即心悶亂目眩華他灸而立愈風池二穴在顳顬後髮際陷中與風府正相當即是側相去各二寸為定穴灸七壯至一百五壯止主肺風面赤目視昏昏項痛強不得回顧面腫皮軟腦疼吹氣多鼻衄窒喘息不通喉咽僂引項攣不收寒熱癲仆煩滿汗不出痎瘧熱灑淅惡寒熱溫病汗不出目眩頭痛淚出缺氣多眥皆赤痛氣發耳塞口僻項皆傴僂伏人耳後六穴顱息二穴在耳後青脈間灸七壯主身熱頭重脅痛風聾耳痛塞耳痛鳴聾胸脅相引不得俯仰及發癎風瘈瘲嘔吐及治目昏眩精視不明瘈脈二穴在耳本雞足青又名體脈灸三壯亦云不灸完骨二穴在耳後入髮際四分灸七壯主喉痺頸項腫不可俯仰頰腫引耳後頭面氣肘腫足痿失履不收風頭耳後痛煩心及足不收口喎僻頭項搖瘈痛牙車急癲疾强仆狂瘧項強急痛牙齒齲痛小便黃赤陰二穴在完骨上枕骨下搖有空空灸七壯主頭痛如錐刀刺不可以動主頷痛引耳嘈嘈耳鳴無所聞舌本出血及主舌寒心乾口煩臂外持節痺不及頭鼻管疸發為病鼻衄頭痛及四肢轉筋癰疸頭痛風惡引頭目浮白二穴在耳後入髮際一寸灸七壯主癭氣肩背不能伸屈氣痺咳逆痰沫牙齒疼痛手縱足緩不收中滿不得喘息耳中嘈嘈無所聞頸項癰翳風二穴在耳後陷中按之引耳中灸七壯主耳痛鳴聾主口噤不開引鼻中口失缺下牙齒痛口眼喎斜失缺脫頷口噤不能言頰腫牙車急痛脊中第一行十一穴大椎在第一椎上陷中宛宛中灸一壯至四十九壯止主五癆七傷溫瘧痎瘧痓背膊悶項強不得回顧主傷寒熱盛煩嘔主風勞食氣陶道在大椎節下間俯而取之灸五壯主頭重目眩灑淅寒熱脊強引頭汗不出頭項如拔痛不可左右顧目不明如脫身柱在第三椎下灸三壯主癲疾瘈瘲怒欲殺人身熱狂走譫言見鬼恍惚不樂胸熱口乾煩渴喘息頭痛吐而不出神道在第五椎節下間俯而取之灸三壯主腰脊急强痎瘧恍惚悲愁健忘驚悸主寒熱頭疼進退往來熱喘目痛視物無明靈臺在第六椎節下間俯而取之主熱病脾熱溫瘧汗不出出素問至陽在第七椎節下間俯而取之灸三壯主寒熱解懶淫濼脛痠四肢重痛怒氣難言筋縮在第九椎下間俯而取之灸三壯主驚癎狂走癲疾脊急强目轉上垂脊腧在第十一椎又名神宗脊中不灸懸樞在第十三椎下節間灸三壯主腰脊不得屈伸强腹中上下積氣水穀不化下痢命門在第十四椎節下俯而取之灸三壯又名屬纍主頭痛如破身熱如火汗不出瘈瘲裏急腰腹相引痛陽關在第十六椎下節間伏而取之灸三壯主脛痺不仁腰腧在二十一椎節下陷中又名背解髓孔腰柱腰戶挺身腹地舒身兩手相重支額縱四體然後乃取之灸七壯四十九壯止忌房事主腰髖疼腰脊强不得回轉溫瘧痎瘧長彊在脊骶端為窮骨下宛宛中又名胸之隂郤龜尾其穴趺地取之乃得日灸三十壯至二百壯慎房事此痔根本忌冷主心痛氣短腸風下血五痔疳蝕小兒脫肛瀉血秋深不較驚癎瘈瘲多吐主驚恐失精瞻視不明眵䁾頭重洞泄腰脊急僵脊痛寒痓反折主癲疾脊中第二行二十一穴大杼二穴在頂後第一椎下兩傍各一寸半陷中不灸又名本神風門在第二椎下兩傍各一寸半灸五壯主傷寒項强目瞑鼻塞風勞嘔逆上氣胸痛背痛氣短不安風眩頭痛鼻清涕出時時嚏不已鼻衄窒喘息不通咳逆肺腧二穴在第三椎下兩傍各一寸半主癲癎癭氣吐逆上氣汗不出支滿脊强寒熱不食肉痛皮癢傳尸骨蒸肺嗽喘咳少氣百病胸中痛胸中氣滿背僂如龜厥隂腧二穴在第四椎下兩傍各一寸半灸五壯鳥山胱經主理逆氣嘔逆牙痛留結胸悶心腧二穴在第五椎下兩傍各一寸半銅人不灸督腧二穴在第六椎下兩傍相去一寸半又名髙蓋許灸主寒熱腹中痛雷鳴氣逆心痛膈腧二穴在第七椎下兩傍相去各一寸半主胸脅相引不得傾側肩背安痙心痛痰飲吐逆汗出寒熱骨痛虛脹支滿痰瘧痃癖氣塊膈上痛喉痺身常濕不食切痛喉痺哽噎咽腫不得消食飲不下主吐食肝腧二穴在第九椎下兩傍相去各一寸半灸三壯主口乾中風支滿短氣不食食不消吐血目不明閉塞腰痛肩疼寒疝主熱病差後食五辛多患眼暗如雀目鼻中酸兩脅急痛唾血嘔筋急手相引筋寒熱痓膽腧二穴在第十椎下兩傍各相去一寸半主心脹滿吐逆短氣痰悶食難下不消舌乾食飲不下目黃胸脅不能轉側頭痛振寒汗不出腋下腫脾腧二穴在第十一椎下兩傍各去一寸半灸三壯主腰身黃脹滿腹肚泄痢身重四肢不收黃喘邪氣痎癖積聚腹痛寒熱腹中氣脹引脊痛食飲多而身羸瘦腰脊强急熱痓引骨痛黃疸喜缺不下食脅下滿欲吐身重不欲動泄痢不食食不生肌膚痰瘧寒熱胃腧二穴在第十二椎下兩傍各去一寸半灸三壯主煩滿吐食腹脹不能食腹滿而鳴胃中寒脹食多嘔吐筋攣急食不下胸脅滿羸瘦腸鳴腹痛脊痛三焦腧二穴在十三椎下兩傍各一寸半灸三壯主水穀不消腹脹腰痛吐逆目眩頭痛食不下腸鳴臚脹腹中痛欲泄注主腹積聚如石肩背拘急腰脊强腎腧二穴在十四椎下兩傍各一寸半與臍對是灸三壯主虛勞耳聾腎虛水藏脹攣急腰痛小便濁隂中疼血精出五勞七傷冷嘔腳膝拘急好獨卧身腫如水小腹痛主嘔吐寒中洞泄不化小便難赤濁骨寒熱兩脅引滿目昏昏不明惡風寒面赤熱心痛如懸氣海腧二穴在第十五椎下兩傍各一寸半主腰痛痔病大腸腧二穴在第十六椎下兩傍各一寸半灸三壯主腰痛腸鳴脹滿繞臍中痛大小便不利或泄痢食不化脊骨强主大小便利腸鳴腹脹腫暴泄食缺喜飲關元腧二穴在第十七椎下兩傍相去一寸半主風勞腰痛泄痢虛脹小便難婦人瘕聚諸疾小腸腧二穴在第十八椎下各一寸半灸三壯主大便膿血出血痔疼痛婦人帶下大小便難淋癃小便黃赤泄痢膿血五色重下腫痛腰脊疝痛腰脊急强膀胱腧二穴在第十九椎下兩傍各一寸半灸三壯主風勞腰痛泄痢腸痛大小便難尿赤隂生瘡少氣足脛冷拘急不得屈伸女人瘕聚煩滿汗不出小便赤黃腰脊急强堅結積聚足清不仁主熱痓引骨痛中膂腧二穴在二十椎下兩傍各一寸半灸三壯又名脊內腧主赤白痢虛渴汗出腰不得俯仰腹脹脅痛腰疝寒熱痓反折白環腧二穴在第二十一椎下兩傍各一寸半不宜灸上窖二穴在第一空腰髁下一寸夾脊兩傍灸三壯主嘔逆寒熱腰痛婦人絶子瘧寒熱隂挺出不禁白瀝痓反折小便大便利主鼻衄次窖二穴在夾脊第二空陷中灸三壯主腰下至足不仁主腰足痛惡寒婦人赤白瀝下心下積脹腰痛不可俯仰足清不仁大小便利疝氣下墜中窖二穴在第三空夾脊陷中灸三壯主婦人赤淫時下氣癃月事少大便難大小便利腹脹飱泄丈夫五勞七傷六極腰痛下窖二穴在第四空夾脊陷中灸三壯主腰痛婦人下蒼汁不禁赤瀝隂中癢痛引小腹控按不可以俯仰大小便利腸鳴臚脹欲泄注㑹陽二穴在隂尾骨兩傍又名利機主腹中有寒泄注腸僻便血久痔陽氣虛乏隂汗濕脊中第三行十三穴附分二穴在第二椎下附項內亷兩傍各二寸灸五壯正坐取之主背痛引頷引頭肩背拘急風冷客於腠頸項强痛不得回顧風勞臂肘不仁魄戶二穴在第三椎下兩傍各三寸宛宛中正坐取之灸七壯主咳逆上氣肺寒熱呼吸不得卧嘔沫喘氣相追逐背胛悶無力勞損萎黃五尸走注項强不得回顧膏肓腧二穴其取穴法有孫思邈王惟一石用之葉善潘琪僧仲之或用鈎股或抱栲栳或坐或卧或立或起或坐而卧手曲肘或坐而伸臂或揣顴骨定髙下或量臍心或量命門或坐點坐灸各有所長然而終未明大法以豫平昔用此數十取十百取百一一無差者各各取之按其穴須得病人中指麻木則灸無不取效其要法在第四椎下第五椎上各去脊三寸宛宛中此穴無所不治主羸瘦虛損夢中失精上氣咳逆狂惑此二穴各一處灸六百壯多至一千壯當覺下氣礱礱然如流水狀當有所下出若無停痰宿疾則無所下灸訖後令人陽氣康强神堂二穴在第五椎下兩傍各三寸陷中正坐取之灸五壯主肩痛胸腹滿灑淅反脊强急寒熱譩嘻二穴在肩膊內亷第六椎兩傍三寸其穴抱肘取之灸二七壯至一百止主溫瘧寒瘧病瘧肩背痛悶氣滿腹脹氣痃肩背寒痓肩甲內亷痛腋拘攣暴脈急脅痛熱病汗不出目眩鼻衄喘逆不得俯仰風瘧小兒食晦頭痛及五心熱瘧久不愈胸中氣咽勞損虛乏不得睡咳逆上氣鬲關二穴在第七椎下兩傍各三寸陷者中灸五壯主背痛惡寒脊强俯難食不下唾噦多涎唾魂門二穴在第九椎下兩傍各三寸陷者中灸三壯主食飲不下腹中雷鳴大便不節赤黃嘔吐不住多涎陽剛二穴在第十椎兩傍各三寸正坐取之灸三壯主食不下腹中雷鳴大小便不節黃水小便黃腸鳴泄注消渴身熱面黃怠惰目黃不嗜食意舍二穴在第十一椎兩傍各三寸正坐取之灸三壯五十壯至一百壯止主腹滿虛脹大便泄滑消渴面黃嗜飲目赤胃倉二穴在第十二椎下各三寸灸三壯主腹內虛脹水食不消惡寒不能俯仰水腫臚脹食飲不下肓門二穴在第十三椎下兩傍各三寸與鳩尾相直灸二十壯主心下肓大堅婦人乳有餘疾志室二穴在第十四椎下兩傍各三寸正坐取之灸三壯主腰脊痛急食不消腹中堅急隂痛下腫並療之脊强兩脅急痛失精小便淋瀝胞肓二穴在第十九椎下兩傍各三寸陷者中伏而取之灸三壯主腰脊痛急食不消腹內堅急隂痛下腫並療之惡氣腰背卒痛秩邊二穴在第二十一椎下兩傍各三寸伏而取之灸三壯主腰痛不能俯仰小便赤黃尻重不能舉五歲發腫明堂灸經卷四
