front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0018_WYG_002-1a, image: WYG0738/WYG0738-0063c.png}
body:
  text: 明堂灸經卷二手太陰肺經十穴少商二穴在手大指端內側去爪甲如韭葉灸三壯銅人不灸主痎瘧主喉中鳴主嘔吐主手不仁振栗鼓頷主咳逆喘主脅下脹主耳前痛主煩心善噦心下滿汗出而寒魚際二穴在手大指本節後內側散脈中灸三壯主胃逆霍亂主唾血吐血主痺走胸背不得息喉中焦乾舌黃主肘攣注滿主痓痙氣失瘖不能言主狂言主熱病振栗鼓頷鼓滿陰痿色不變頭痛不汗出灑淅惡風寒目眩腹痛不下食咳引尻痛太泉二穴在手掌後陷者中又名太淵灸三壯主胸痺逆氣寒厥善噦嘔飲水咳嗽煩怨不得卧肺膨脹臂內亷痛目生白翳眼眥赤筋缺盆中引痛掌中熱數缺喘不得息噫氣上逆心痛唾血振寒咽乾狂言經渠二穴在寸口陷者中不灸列缺二穴在踠上一寸半灸三壯主偏風半身不舉口喎肘臂痛腕勞及痎瘧主汗出四肢腫小便熱痛主手臂身熱主肩背寒栗少氣不足以息寒厥交無故而驚凡實則肩背汗出四肢暴腫虛則肩寒栗氣不足以息四肢厥喜笑身􅀈搖時時寒主熱癎驚而有所見主熱病煩心悶悶先手擘身熱瘈瘲唇口聚鼻張目下汗出如珠寒熱掌中熱主瘧寒熱及喉痺咳嗽不止又瘧甚熱口噤不開孔最二穴在腕上七寸灸五灸主熱病汗不出肘擘厥痛伸難手不及頭不握天澤二穴在肘中約上動脈灸三壯甄權云不宜灸小兒慢驚灸一壯主舌乾脅痛主短氣心煩主腹脹喘振栗主嘔泄下上出兩脅下痛主癲病不可向手擘不得上頭喉痺咳逆上氣呼吸多唾澤沫膿血主掣痛手不可伸主肘痛時寒肩背寒痓肩甲內亷痛氣膈喜嘔鼓頷不得汗煩心身痛四肢暴腫狹白二穴在天府下去肘五寸動脈灸五壯主咳乾嘔煩滿主心痛氣短天府二穴在腋下三寸灸五壯主身脹逆息不得卧風汗身腫喘息多唾主上息喘不得息主喘逆上氣呼吸肩息不知食味卒中惡風邪氣飛尸惡鬼語遁尸瘧病瘤癭氣咽腫泣出盲目眩逺視昏昏臑㑹二穴在臂前亷去眉頭三寸主瘤癭氣咽腫主寒熱頭瘰厯癲疾􅀈氣肘節痺臂酸重腋急痛肘難屈伸臂痛不能舉手厥陰心主經八穴中衝二穴在手中主指去爪甲如韭葉陷者中主肘中痛主舌本痛主熱病煩心心悶而汗不出掌中心熱心痛身熱如火浸淫煩滿頭痛如破主神氣不足失忘勞宫二穴在掌中央動脈灸三灸主喉嗌痛主大便血不止尿血及赤主渴食不下主嘔吐主風熱善怒心中悲喜思慕歔欷喜笑不主手痺主熱病三日已往不得汗怵惕胸脅不可反側咳溺溺赤小便血衄不止嘔吐血氣逆噫不止嗌中痛食不下善渴口中爛掌中熱欲嘔主黃疸目黃主熱㽲大陵二穴在掌後兩骨間灸二壯主喉痺嗌乾主心痛主目赤小便如血咳逆寒熱發主手掣手攣及肘攣腋腫主風熱善怒心中悲喜思慕歔欷喜笑不止主心下淡淡喜驚主熱病煩心心悶悶汗不出掌中熱頭痛身熱如火浸淫煩滿舌本痛主瘧乍寒乍熱主咳喘主嘔血主胸中痛主痂疥內關二穴在掌後二寸去腕手心主面赤熱主目昏昏昏夜無所見主目赤支滿中風肘攣實心暴痛虛則心煩惕惕間使二穴在掌後二寸兩筋間灸七寸主心胸痺背相引主心懸如飢主嗌中如扼主肘內亷痛主熱病煩心喜噦胸中淡淡喜動為熱惡風寒嘔吐怵惕寒中少氣掌中熱多驚瘖不得語腋腫肘攣卒心痛郤門二穴在掌後去腕五寸灸五壯主心痛主衄血嘔血主驚恐畏人神氣不足曲澤二穴在肘內亷下陷者中屈肘得之灸三壯主心痛主逆氣嘔涎或血主掣痛手不可伸主心下淡淡喜驚主傷寒溫病身心熱口乾肘瘈善搖頭顔清天泉二穴在腋下二寸舉腋取之灸三壯主咳逆主心病胸脅肢滿膺背脾間臂內亷動手少陰心經八穴少衝二穴在手小指內亷之端去爪甲如韭葉灸三壯又名經始主胸痛口熱咽酸乍寒乍熱主咽酸主太息煩滿痰冷少氣悲驚主熱病煩心心悶而汗不出掌中熱主上氣平心痛悲恐畏人善驚手拳不得伸引肘腋痛主身熱如火浸淫煩滿舌本痛主驚癎吐舌沫出少府二穴在手小指大節後陷者宫直勞中大節又作本節灸十壯主嗌中有氣如息肉狀主小便不利癃主數噫恐悸氣不足主陰痛實時挺長寒熱陰暴痛遺尿偏虛則暴癢氣逆及主煩滿少氣悲恐畏人掌中熱肘腋攣急胸中痛手拳不能伸神門二穴在掌後鋭骨端陷者中灸七壯主笑若狂主手掣肘攣主遺尿主喉痺心痛數噫恐怖少氣不足主瘧心熱甚欲得飲冷惡寒則欲處溫中咽乾不嗜食手臂寒喘逆身熱狂悲哭大小人五癎陰郤二穴在掌後動脈中去腕半寸灸七壯主氣驚心痛主失瘖不能言灑淅振寒厥逆霍亂胸中滿衄血驚恐通理二穴在腕後一寸灸三壯主頭眩痛目眩面赤而熱心悸肘腕酸重及暴啞不能言少氣熱病煩心心中懊憹數缺頻伸心下悸悲恐主遺溺主熱病先不樂數日主臂臑痛實則支腫虛則不能言靈道二穴在掌後一寸半灸三壯主心痛悲恐相引瘈瘲主肘攣榰滿主暴瘖不能語言少海二穴在肘內亷節後陷中灸三壯主頭痛汗出寒熱不惡寒主肩臂不舉不能帶衣項強急痛不可以顧主齲齒主氣逆呼吸噫噦嘔羊癲疾羊癎吐舌羊鳴戾頸主手臂攣主瘧振寒項痛引肘腋痛引少腹中四肢不舉主目眩發狂目黃脅痛極泉二穴在腋下筋間動脈入胸灸七壯主心痛乾嘔四肢不收咽乾煩渴臂肘厥寒目黃脅下滿明堂灸經卷二
